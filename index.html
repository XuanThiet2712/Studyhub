<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>StudyHub — TOEIC 600+</title>
<link rel="stylesheet" href="css/main.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
</head>
<body>

<!-- ── MOBILE TOPBAR ── -->
<div class="mobile-topbar" id="mobileTopbar" style="display:none">
  <button class="mobile-menu-btn" onclick="toggleMobileSidebar()" aria-label="Menu">☰</button>
  <span class="mobile-topbar-title">StudyHub</span>
  <div id="mobileTopbarAvatar" style="width:32px;height:32px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer" onclick="app?.router?.navigate('/profile')">👤</div>
</div>

<!-- ── SIDEBAR OVERLAY ── -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeMobileSidebar()"></div>

<div id="app">
  <!-- Loading screen -->
  <div id="loadingScreen" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#eff6ff,#f5f3ff)">
    <div style="text-align:center">
      <div style="font-family:'Lora',serif;font-style:italic;font-size:36px;font-weight:700;background:linear-gradient(135deg,#3b82f6,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px">
        StudyHub
      </div>
      <div style="font-size:13px;color:#8896a5;font-family:monospace">Đang khởi động...</div>
      <div style="margin-top:16px;width:200px;height:3px;background:#e4e8f0;border-radius:99px;overflow:hidden;margin:16px auto 0">
        <div id="loadBar" style="height:100%;background:linear-gradient(90deg,#3b82f6,#8b5cf6);border-radius:99px;width:0%;transition:width .3s"></div>
      </div>
    </div>
  </div>
</div>

<!-- ── MOBILE BOTTOM NAV ── -->
<nav class="mobile-bottom-nav" id="mobileBottomNav" style="display:none">
  <button class="mob-nav-item" onclick="app?.router?.navigate('/dashboard')" data-route="/dashboard">
    <span class="icon">🏠</span><span>Trang chủ</span>
  </button>
  <button class="mob-nav-item" onclick="app?.router?.navigate('/vocabulary')" data-route="/vocabulary">
    <span class="icon">📚</span><span>Từ vựng</span>
  </button>
  <button class="mob-nav-item" onclick="app?.router?.navigate('/chat')" data-route="/chat">
    <span class="icon">💬</span><span>Chat</span>
  </button>
  <button class="mob-nav-item" onclick="app?.router?.navigate('/ai-tutor')" data-route="/ai-tutor">
    <span class="icon">🤖</span><span>AI Tutor</span>
  </button>
  <button class="mob-nav-item" onclick="app?.router?.navigate('/conversation')" data-route="/conversation">
    <span class="icon">🗣️</span><span>Giao tiếp</span>
  </button>
  <button class="mob-nav-item" onclick="app?.router?.navigate('/game')" data-route="/game">
    <span class="icon">⚔️</span><span>Game</span>
  </button>
  <button class="mob-nav-item" onclick="app?.router?.navigate('/profile')" data-route="/profile">
    <span class="icon">👤</span><span>Hồ sơ</span>
  </button>
</nav>

<div id="toastRoot"></div>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Lora:ital,wght@0,600;1,400;1,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<script>
// ── MOBILE SIDEBAR TOGGLE ──
function toggleMobileSidebar() {
  const sb  = document.getElementById('sidebar');
  const ov  = document.getElementById('sidebarOverlay');
  if (!sb) return;
  const open = sb.classList.toggle('open');
  if (open) { ov.classList.add('open'); document.body.style.overflow = 'hidden'; }
  else       { ov.classList.remove('open'); document.body.style.overflow = ''; }
}
function closeMobileSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sidebarOverlay');
  if (sb) sb.classList.remove('open');
  if (ov) ov.classList.remove('open');
  document.body.style.overflow = '';
}

// ── UPDATE MOBILE BOTTOM NAV ACTIVE STATE ──
function updateMobileNav(route) {
  document.querySelectorAll('.mob-nav-item').forEach(btn => {
    const r = btn.getAttribute('data-route');
    btn.classList.toggle('active', route === r || (r === '/dashboard' && route === '/'));
  });
}

// ── SHOW MOBILE UI WHEN LOGGED IN ──
function showMobileUI(user) {
  const isMobile = window.innerWidth <= 768;
  document.getElementById('mobileTopbar').style.display = isMobile ? 'flex' : 'none';
  document.getElementById('mobileBottomNav').style.display = isMobile ? 'flex' : 'none';
  if (user) {
    const ava = document.getElementById('mobileTopbarAvatar');
    if (ava && user.avatar_id) {
      ava.innerHTML = '<img src="'+window._avatarUrl(user.avatar_id)+'" style="width:32px;height:32px;border-radius:50%;border:2px solid var(--border)">';
    }
  }
}
function hideMobileUI() {
  document.getElementById('mobileTopbar').style.display = 'none';
  document.getElementById('mobileBottomNav').style.display = 'none';
}

// ── RESIZE HANDLER ──
window.addEventListener('resize', () => {
  const logged = window.app?.store?.get('isLoggedIn');
  if (logged) showMobileUI(window.app?.store?.get('currentUser'));
  else hideMobileUI();
});
</script>

<script type="module">
import { EventBus, Store, Router, App } from './src/core/index.js';
import { SupabaseService, AuthService, RealtimeService } from './src/services/index.js';
import { Sidebar, Toast } from './src/components/index.js';
import { AuthPage }        from './src/pages/AuthPage.js';
import { FriendsPage }      from './src/pages/FriendsPage.js';
import { AITutorPage }       from './src/pages/AITutorPage.js';
import { NotificationSystem } from './src/components/NotificationSystem.js';
import { DashboardPage }   from './src/pages/DashboardPage.js';
import { ChatPage }        from './src/pages/ChatPage.js';
import { GamePage }        from './src/pages/GamePage.js';
import { LeaderboardPage } from './src/pages/LeaderboardPage.js';
import { User }            from './src/models/index.js';

// Expose avatarUrl helper for vanilla scripts
window._avatarUrl = (id) => User.avatarUrl(id);

const setProgress = (pct) => { const b = document.getElementById('loadBar'); if (b) b.style.width = pct + '%'; };

async function boot() {
  setProgress(10);

  const bus    = new EventBus();
  const store  = new Store({ currentUser: null, isLoggedIn: false, onlineUsers: [], activeRoute: '/' });
  const router = new Router();
  window.app   = { bus, store, router, services: {}, pages: {} };

  setProgress(25);
  const db = new SupabaseService();
  await db.init();
  window.app.db = db;

  setProgress(45);
  const auth     = new AuthService(db, store, bus);
  const realtime = new RealtimeService(db, store, bus);
  window.app.services.auth     = auth;
  window.app.services.realtime = realtime;

  setProgress(60);
  const session = await auth.restoreSession();

  setProgress(75);
  const appEl = document.getElementById('app');

  function buildShell() {
    closeMobileSidebar();
    appEl.innerHTML = `
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main" id="mainContent"></div>`;
    const sidebar = new Sidebar(store, bus, router);
    sidebar.mount(document.getElementById('sidebar'));
    window.app.sidebar = sidebar;
  }

  router.beforeEach(path => {
    const publicPaths = ['/', '/login', '/register'];
    if (!publicPaths.includes(path) && !store.get('currentUser')) return '/';
    if (publicPaths.includes(path) && store.get('currentUser'))   return '/dashboard';
    store.set('activeRoute', path);
    bus.emit('route:change', path);
    updateMobileNav(path);
    return null;
  });

  router.register('/', () => {
    hideMobileUI();
    appEl.innerHTML = '';
    const authPage = new AuthPage(auth, router);
    authPage.render();
    window.authPage = authPage;
  });

  router.register('/dashboard', () => {
    buildShell();
    showMobileUI(store.get('currentUser'));
    new DashboardPage(db, store, bus).render();
  });

  router.register('/chat', () => {
    buildShell();
    showMobileUI(store.get('currentUser'));
    const page = new ChatPage(db, realtime, store, bus);
    page.render();
    window.chatPage = page;
  });

  router.register('/game', () => {
    buildShell();
    showMobileUI(store.get('currentUser'));
    const page = new GamePage(db, realtime, store, bus);
    page.render();
    window.gamePage = page;
  });

  router.register('/leaderboard', () => {
    buildShell();
    showMobileUI(store.get('currentUser'));
    new LeaderboardPage(db, store).render();
  });

  const lazyRoute = (path, file, PageClass, ...extra) => {
    router.register(path, async () => {
      buildShell();
      showMobileUI(store.get('currentUser'));
      const mod  = await import(file);
      const page = new mod[PageClass](db, store, bus, ...extra);
      page.render();
    });
  };

  lazyRoute('/vocabulary', './src/pages/VocabularyPage.js', 'VocabularyPage', realtime);
  lazyRoute('/roadmap',    './src/pages/RoadmapPage.js',    'RoadmapPage');
  lazyRoute('/wordlab',    './src/pages/WordLabPage.js',    'WordLabPage');
  lazyRoute('/forgetting', './src/pages/ForgettingPage.js', 'ForgettingPage');
  lazyRoute('/notes',      './src/pages/NotesPage.js',      'NotesPage');
  lazyRoute('/documents',  './src/pages/DocumentsPage.js',  'DocumentsPage');
  lazyRoute('/pomodoro',   './src/pages/PomodoroPage.js',   'PomodoroPage');
  lazyRoute('/profile',    './src/pages/ProfilePage.js',    'ProfilePage', auth);

  router.register('/friends', () => {
    buildShell();
    showMobileUI(store.get('currentUser'));
    const page = new FriendsPage(db, store, bus, realtime);
    page.render();
  });

  router.register('/ai-tutor', () => {
    buildShell();
    showMobileUI(store.get('currentUser'));
    const page = new AITutorPage(db, store, bus);
    page.render();
  });

  router.register('/conversation', () => {
    buildShell();
    showMobileUI(store.get('currentUser'));
    import('./src/pages/ConversationPage.js').then(mod => {
      const page = new mod.ConversationPage(db, store, bus);
      page.render();
      window.convPage = page;
    });
  });

  let notifSystem = null;
  bus.on('auth:login', async (user) => {
    Toast.ok('Chào mừng, ' + (user.display_name || user.username) + '! 👋');
    realtime.initPresence({ id:user.id, username:user.username, display_name:user.display_name, avatar_id:user.avatar_id, xp:user.xp });
    router.navigate('/dashboard');
    // Init notification system
    setTimeout(() => {
      notifSystem = new NotificationSystem(db, store, bus);
      notifSystem.init();
    }, 1000);
  });

  bus.on('auth:logout', () => {
    realtime.leavePresence();
    hideMobileUI();
    router.navigate('/');
    Toast.info('Đã đăng xuất');
  });

  setProgress(90);

  if (session) {
    realtime.initPresence({ id:session.id, username:session.username, display_name:session.display_name, avatar_id:session.avatar_id, xp:session.xp });
  }

  setProgress(100);
  setTimeout(() => {
    document.getElementById('loadingScreen')?.remove();
    router.start();
    Toast.init();
  }, 300);
}

boot().catch(err => {
  console.error('Boot error:', err);
  document.getElementById('loadingScreen').innerHTML = `
  <div style="text-align:center;padding:20px">
    <div style="font-size:40px;margin-bottom:12px">⚠️</div>
    <div style="font-size:16px;font-weight:600;margin-bottom:8px">Lỗi khởi động</div>
    <div style="font-size:13px;color:#8896a5;margin-bottom:16px">${err.message}</div>
    <div style="font-size:12px;color:#b5c0cc;font-family:monospace;background:#f5f7fa;padding:12px;border-radius:8px;max-width:400px;text-align:left">
      Kiểm tra: Supabase URL và API key trong<br><strong>src/services/SupabaseService.js</strong>
    </div>
    <button onclick="location.reload()" style="margin-top:16px;padding:10px 20px;background:#3b82f6;color:white;border:none;border-radius:8px;cursor:pointer">Thử lại</button>
  </div>`;
});
</script>
</body>
</html>
